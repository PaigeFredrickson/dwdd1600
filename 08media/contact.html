    <style>
        /* Requirement: Style the fieldsets */
        .myform fieldset {
            margin-bottom: 25px;
            padding: 20px;
            border: 2px solid #3d2920;
            border-radius: 8px;
        }
        /* Requirement: Style the legends */
        .myform legend {
            font-weight: 700;
            color: #3d2920;
            padding: 0 10px;
            text-transform: uppercase;
        }
        /* Requirement: Specific styling for Text, Email, and Tel inputs */
        .myform input[type="text"], 
        .myform input[type="email"], 
        .myform input[type="tel"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Requirement: Style Select and Textarea */
        .myform select, 
        .myform textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Requirement: Style the Submission Button */
        .myform input[type="submit"] {
            background-color: rgb(219, 77, 153);
            color: #ffd1df;
            border: 2px solid #3d2920;
            border-radius: 12px;
            padding: 15px 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .myform label {
            display: block;
            margin-bottom: 15px;
            font-weight: 400;
        }
        footer { clear: both; }
    </style>

<body>
 <header>
    <div class="container"> <div class="logo-container">
            <img src="favicon.ico" alt="WIPA Logo" class="logo">
            <span>WhoIsPaigeAnyway</span>
        </div>
    </div>
</header>

 <nav>

        </ul>

    <main>
        <h1>Connect with Me</h1>
        <form method="get" action="thanks.html" class="myform">
            
            <fieldset>
                <legend>Contact Information</legend>
                <label>Full Name: <input type="text" name="fullname" required></label>
                <label>Email Address: <input type="email" name="email" required></label>
                <label>Phone Number: <input type="tel" name="phone" required placeholder="123-456-7890"></label>
            </fieldset>

            <fieldset>
                <legend>Inquiry Details</legend>
                <label><input type="radio" name="reason" value="design" required> Design Inquiry</label>
                <label><input type="radio" name="reason" value="collab"> Collaboration</label>
            </fieldset>

            <fieldset>
                <legend>Preferences</legend>
                <label><input type="checkbox" name="interest" value="upcycling"> Upcycling</label>
                <label><input type="checkbox" name="interest" value="sustainable"> Sustainable Fabrics</label>
                <br>
                <label>Best Time to Contact:
                    <select name="contact_time" required>
                        <option value="">Please Select</option>
                        <option value="morning">Morning</option>
                        <option value="afternoon">Afternoon</option>
                    </select>
                </label>
            </fieldset>

            <label>Message: <textarea name="message" required></textarea></label>
            <input type="submit" value="Send Inquiry">
        </form>
    </main>
