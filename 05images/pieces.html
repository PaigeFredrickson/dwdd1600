    <style>
        /* Gallery layout inspired by dishes.html but styled for fashion */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }

        .gallery figure {
            margin: 0;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #ddd; /* Subtle fashion-forward divider */
            padding-bottom: 15px;
        }

        .image-placeholder {
            width: 100%;
            height: 350px; /* Taller aspect ratio for fashion portraits */
            background-color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oxygen', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            color: #999;
            transition: background-color 0.3s ease;
        }

        .image-placeholder:hover {
            background-color: #e8e8e8;
        }

        figcaption {
            padding-top: 15px;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 400;
            font-size: 0.95rem;
            text-align: left;
            text-transform: uppercase;
        }
    </style>
</head>
