<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Get in touch with Paige Fredrickson for collaborations and inquiries."/>
    <title>WhoIsPaigeAnyway - Contact Us</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="fashion.css">
    <style>
        /* Requirement: Style the fieldsets */
        .myform fieldset {
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #3d2920;
            border-radius: 8px;
        }
        /* Requirement: Style the legend */
        .myform legend {
            font-weight: 700;
            color: #3d2920;
            padding: 0 10px;
            text-transform: uppercase;
        }
        /* Requirement: Style Text, Email, Telephone, Select, and Textarea */
        .myform input[type="text"], 
        .myform input[type="email"], 
        .myform input[type="tel"],
        .myform select, 
        .myform textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Oxygen', sans-serif;
        }
        /* Requirement: Style the Submission Button */
        .myform input[type="submit"] {
            background-color: rgb(219, 77, 153);
            color: #ffd1df;
            border: 2px solid #3d2920;
            border-radius: 10px;
            padding: 12px 25px;
            font-weight: 700;
            cursor: pointer;
        }
        .myform label {
            display: block;
            margin-bottom: 10px;
        }
        footer { clear: both; }
    </style>
</head>
<body>
    <header><span>WhoIsPaigeAnyway</span></header>
    
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="runway.html">Runway</a></li>
            <li><a href="pieces.html">Pieces</a></li>
            <li class="active"><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    
    <main>
        <h1>Connect with Me</h1>
        <form method="get" action="thanks.html" class="myform">

            <fieldset>
                <legend>Personal Information</legend>
                <label> Full Name: <input type="text" name="fullname" required> </label>
                <label> Email Address: <input type="email" name="email" required> </label>
                <label> Phone Number: <input type="tel" name="phone" placeholder="123-456-7890" required> </label>
            </fieldset>

            <fieldset>
                <legend>Inquiry Type</legend>
                <label><input type="radio" value="learn" name="reason" required> Learn more about my process</label>
                <label><input type="radio" value="collaborate" name="reason"> Partnership Inquiry</label>
            </fieldset>

            <fieldset>
                <legend>Design Interests</legend>
                <label><input type="checkbox" name="interest" value="upcycling"> Upcycling</label>
                <label><input type="checkbox" name="interest" value="zerowaste"> Zero-waste</label>
                <br>
                <label>Where did you find me? 
                    <select name="discovery" required>
                        <option value="">Please Select</option>
                        <option value="social">Social Media</option>
                        <option value="runway">Runway Show</option>
                    </select>
                </label>
            </fieldset>

            <label>Message:
                <textarea name="message" required></textarea>
            </label>

            <input type="submit" value="Send Inquiry">
        </form>
    </main>
    <footer><p>&copy; 2026 &bull; Paige Fredrickson &bull; All Rights Reserved</p></footer>
</body>
</html>
