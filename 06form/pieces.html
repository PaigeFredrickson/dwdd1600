    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

            padding: 40px 0;
        }

        .gallery figure {
            margin: 0;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }

        /* Added to ensure your uploaded images fit the container */
        .gallery img {
            width: 100%;
            height: 350px;
            object-fit: cover; /* This keeps the image from looking squished */
            display: block;
            background-color: #f2f2f2;
        }

        figcaption {
            padding-top: 15px;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 400;
            font-size: 0.95rem;
            text-align: left;
            text-transform: uppercase;
        }
    </style>
